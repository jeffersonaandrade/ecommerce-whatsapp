# CI leve — protege o core sem secrets.
#
# Estado atual:
#   - anti-slug guard (qa:check-no-client-branching)
#   - testes unitários (npm test)
#
# Build real: Netlify (envs de produção já configuradas no painel).
# Smoke pós-deploy: obrigatório (test:e2e:smoke:client).
#
# Futuro — CI completo com GitHub Secrets (UnitSports):
#   UNITSPORTS_NEXT_PUBLIC_SUPABASE_URL
#   UNITSPORTS_NEXT_PUBLIC_SUPABASE_ANON_KEY
#   UNITSPORTS_SUPABASE_SERVICE_ROLE_KEY
#   UNITSPORTS_NEXT_PUBLIC_SITE_URL
#   UNITSPORTS_QA_BASE_URL
# → reativar npm run build:client -- unitsports no workflow.

name: QA

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Anti-slug guard
        run: npm run qa:check-no-client-branching

      - name: Unit tests
        run: npm test
